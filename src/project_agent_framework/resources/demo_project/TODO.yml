    title: Add regression tests and usage notes
    description: Add tests for the report helpers and CLI output, and document the local run command.
    acceptance_criteria:
      - pytest passes for the target project
      - tests cover report aggregation and CLI output
      - README includes the local run command
    priority: 3
    status: Ready
    qa_result: Pending
    coder_note: ""
    qa_note: ""
    architect_note: ""
    depends_on:
      - INV-001
      - INV-002
